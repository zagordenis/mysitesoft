name: Validate software.json

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install --no-cache-dir 'jsonschema[format]==4.23.0'

      - name: Validate software.json against schema
        run: |
          python - <<'PY'
          import json, sys
          from jsonschema import Draft202012Validator, FormatChecker

          with open('.schema/software.schema.json', encoding='utf-8') as f:
              schema = json.load(f)
          with open('software.json', encoding='utf-8') as f:
              data = json.load(f)

          validator = Draft202012Validator(schema, format_checker=FormatChecker())
          errors = sorted(validator.iter_errors(data), key=lambda e: list(e.absolute_path))
          if errors:
              for err in errors:
                  path = '/'.join(str(p) for p in err.absolute_path) or '<root>'
                  print(f"FAIL  {path}: {err.message}")
              sys.exit(1)

          print(f"OK    software.json is valid ({len(data)} entries)")

          names = [item.get('name', '<no name>') for item in data]
          duplicates = sorted({n for n in names if names.count(n) > 1})
          if duplicates:
              print(f"FAIL  duplicate name(s) in software.json: {', '.join(duplicates)}")
              sys.exit(1)
          print(f"OK    no duplicate names")

          # Slug-collision guard: –і–Ј–µ—А–Ї–∞–ї–Є—В—М slugify() –Ј app.js. –Ъ–Њ–ї—Ц–Ј—Ц—П –±–∞–Ј–Њ–≤–Є—Е
          # slug-—Ц–≤ = —А–Є–Ј–Є–Ї —В–Њ–≥–Њ, —Й–Њ hash permalink (#card-<slug>) –≤–Ї–∞–ґ–µ –љ–∞ —Ц–љ—И—Г
          # –Ї–∞—А—В–Ї—Г –њ—А–Є –Љ–∞–є–±—Г—В–љ—М–Њ–Љ—Г –і–Њ–і–∞–≤–∞–љ–љ—Ц –і–∞–љ–Є—Е. CI –Љ–∞—Ф –ї–Њ–≤–Є—В–Є –Ф–Ю –Љ–µ—А–і–ґ—Г.
          UA_TRANSLIT = {
              '–∞':'a','–±':'b','–≤':'v','–≥':'h','“С':'g','–і':'d','–µ':'e','—Ф':'ie',
              '–ґ':'zh','–Ј':'z','–Є':'y','—Ц':'i','—Ч':'i','–є':'i','–Ї':'k','–ї':'l',
              '–Љ':'m','–љ':'n','–Њ':'o','–њ':'p','—А':'r','—Б':'s','—В':'t','—Г':'u',
              '—Д':'f','—Е':'kh','—Ж':'ts','—З':'ch','—И':'sh','—Й':'shch','—М':'',
              '—О':'iu','—П':'ia',"'":'',
              '—С':'e','—Л':'y','—Н':'e','—К':''
          }
          import re
          def slugify(s: str) -> str:
              out = []
              for ch in s.lower():
                  if ch in UA_TRANSLIT:
                      out.append(UA_TRANSLIT[ch])
                  elif ch == '+':
                      out.append('-plus')
                  elif ch == '#':
                      out.append('-sharp')
                  else:
                      out.append(ch)
              s2 = re.sub(r'[^a-z0-9]+', '-', ''.join(out)).strip('-')
              return s2 or 'item'

          slug_to_names = {}
          for n in names:
              s = slugify(n)
              slug_to_names.setdefault(s, []).append(n)
          collisions = {s: ns for s, ns in slug_to_names.items() if len(ns) > 1}
          if collisions:
              for s, ns in sorted(collisions.items()):
                  print(f"FAIL  slug collision '{s}' from: {', '.join(ns)}")
              print("      Slug collisions silently break #card-<slug> permalinks.")
              print("      Rename one of the colliding programs.")
              sys.exit(1)
          print(f"OK    no slug collisions ({len(slug_to_names)} unique slugs)")
          PY
